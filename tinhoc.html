<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập Tin Học 11</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #243050;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --accent-glow: rgba(59,130,246,0.25);
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .header .badge {
    display: inline-block;
    padding: 4px 14px;
    border: 1px solid var(--accent);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 16px;
  }

  .header h1 {
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 800;
    line-height: 1.15;
    background: linear-gradient(135deg, #e2e8f0 0%, #60a5fa 60%, #818cf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    margin-top: 10px;
    color: var(--text-dim);
    font-size: 15px;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 36px;
    animation: fadeUp 0.5s ease 0.2s both;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #818cf8);
    border-radius: 999px;
    transition: width 0.4s ease;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* Score badge */
  .score-display {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .score-pill {
    padding: 8px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid;
  }

  .score-pill.correct { border-color: var(--green); color: var(--green); background: rgba(16,185,129,0.08); }
  .score-pill.wrong   { border-color: var(--red);   color: var(--red);   background: rgba(239,68,68,0.08); }
  .score-pill.left    { border-color: var(--border); color: var(--text-muted); background: transparent; }

  /* Mode selector */
  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    background: var(--surface);
    padding: 6px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .mode-tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-tab.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  /* Question card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    animation: slideIn 0.35s ease both;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #818cf8);
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .question-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    font-weight: 600;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .question-text {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 20px;
  }

  .question-text code {
    font-family: 'JetBrains Mono', monospace;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--accent2);
  }

  /* MC options */
  .options-list {
    display: grid;
    gap: 10px;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    transition: all 0.18s;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(59,130,246,0.06);
    transform: translateX(3px);
  }

  .option-btn .opt-label {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.18s;
    margin-top: 1px;
  }

  .option-btn.correct {
    border-color: var(--green);
    background: rgba(16,185,129,0.08);
  }
  .option-btn.correct .opt-label {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(239,68,68,0.08);
  }
  .option-btn.wrong .opt-label {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  .option-btn.show-correct {
    border-color: var(--green);
    background: rgba(16,185,129,0.05);
  }
  .option-btn.show-correct .opt-label {
    border-color: var(--green);
    color: var(--green);
  }

  /* True/False */
  .tf-group {
    display: grid;
    gap: 10px;
  }

  .tf-item {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
  }

  .tf-item .tf-statement {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.55;
  }

  .tf-item .tf-label-prefix {
    font-weight: 700;
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .tf-buttons {
    display: flex;
    gap: 8px;
  }

  .tf-btn {
    flex: 1;
    padding: 9px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.18s;
  }

  .tf-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent2);
  }

  .tf-btn.selected-true {
    border-color: var(--accent);
    background: rgba(59,130,246,0.12);
    color: var(--accent2);
  }

  .tf-btn.selected-false {
    border-color: var(--yellow);
    background: rgba(245,158,11,0.1);
    color: var(--yellow);
  }

  .tf-btn.reveal-correct { border-color: var(--green); background: rgba(16,185,129,0.1); color: var(--green); }
  .tf-btn.reveal-wrong   { border-color: var(--red);   background: rgba(239,68,68,0.1);  color: var(--red);  }

  /* Feedback */
  .feedback-box {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    display: none;
  }

  .feedback-box.show { display: block; }
  .feedback-box.correct { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); color: #6ee7b7; }
  .feedback-box.wrong   { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.25);  color: #fca5a5; }

  /* Action buttons */
  .action-row {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .btn-check, .btn-next, .btn-skip, .btn-restart {
    padding: 11px 24px;
    border-radius: 8px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-check {
    background: var(--accent);
    color: white;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .btn-check:hover { transform: translateY(-1px); box-shadow: 0 4px 24px var(--accent-glow); }
  .btn-check:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-next {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-next:hover { border-color: var(--accent); color: var(--accent2); }

  .btn-skip {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-skip:hover { color: var(--text); }

  .btn-restart {
    background: var(--surface2);
    color: var(--accent2);
    border: 1px solid var(--accent);
    margin-left: auto;
  }

  /* Result screen */
  .result-screen {
    display: none;
    text-align: center;
    padding: 60px 20px;
    animation: fadeUp 0.5s ease both;
  }

  .result-screen.show { display: block; }

  .result-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin: 0 auto 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 3px solid var(--accent);
    box-shadow: 0 0 40px var(--accent-glow);
    background: var(--surface);
  }

  .result-circle .pct {
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent2), #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .result-circle .pts {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .result-title {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .result-sub {
    color: var(--text-muted);
    font-size: 15px;
    margin-bottom: 36px;
  }

  .result-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .stat-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 28px;
    min-width: 110px;
  }

  .stat-item .sv { font-size: 30px; font-weight: 800; }
  .stat-item .sl { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .stat-item.c .sv { color: var(--green); }
  .stat-item.w .sv { color: var(--red); }
  .stat-item.s .sv { color: var(--yellow); }

  /* MC size tabs */
  .mc-size-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease 0.15s both;
  }

  .size-tab {
    padding: 8px 20px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .size-tab:hover { border-color: var(--accent2); color: var(--accent2); }

  .size-tab.active {
    border-color: var(--accent2);
    background: rgba(96,165,250,0.1);
    color: var(--accent2);
  }

  /* Animations */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn  { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge"> Tin Học 11</div>
    <h1>project 1</h1>
    <p>Tày</p>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('mc')">Trắc Nghiệm</button>
    <button class="mode-tab" onclick="setMode('tf')">Đúng / Sai</button>
    <button class="mode-tab" onclick="setMode('all')">Tất Cả Ngẫu Nhiên</button>
  </div>

  <div class="mc-size-tabs" id="mcSizeTabs">
    <button class="size-tab active" onclick="setMCSize(20)">20 câu</button>
    <button class="size-tab" onclick="setMCSize(40)">40 câu</button>
    <button class="size-tab" onclick="setMCSize(70)">70 câu (toàn bộ)</button>
  </div>

  <div id="quizArea">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progLabel">Câu 1 / 20</span>
        <span id="progPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <div class="score-display">
      <div class="score-pill correct">✓ Đúng: <span id="scoreC">0</span></div>
      <div class="score-pill wrong">✗ Sai: <span id="scoreW">0</span></div>
      <div class="score-pill left">Còn lại: <span id="scoreL">20</span></div>
    </div>

    <div id="questionWrap"></div>

    <div class="action-row">
      <button class="btn-check" id="btnCheck" onclick="checkAnswer()">Kiểm Tra</button>
      <button class="btn-next"  id="btnNext"  onclick="nextQuestion()" style="display:none">Câu Tiếp →</button>
      <button class="btn-skip"  id="btnSkip"  onclick="skipQuestion()">Bỏ qua</button>
      <button class="btn-restart" onclick="restart()">Làm lại</button>
    </div>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-circle">
      <div class="pct" id="resPct">0%</div>
      <div class="pts" id="resPts">0/0</div>
    </div>
    <div class="result-title" id="resTitle">Hoàn thành!</div>
    <div class="result-sub" id="resSub"></div>
    <div class="result-stats">
      <div class="stat-item c"><div class="sv" id="rsC">0</div><div class="sl">Đúng</div></div>
      <div class="stat-item w"><div class="sv" id="rsW">0</div><div class="sl">Sai</div></div>
      <div class="stat-item s"><div class="sv" id="rsS">0</div><div class="sl">Bỏ qua</div></div>
    </div>
    <button class="btn-check" onclick="restart()" style="font-size:16px;padding:14px 36px;">Làm Lại</button>
  </div>

</div>

<script>
// ===================== DATA =====================
const mcQuestions = [
  // --- Nhóm 1: MySQL & HeidiSQL ---
  { q: "MySQL là hệ quản trị cơ sở dữ liệu thuộc loại nào?", opts: ["Mã nguồn mở và miễn phí","Trả phí bản quyền","Được phát triển bởi Microsoft","Không hỗ trợ quản trị CSDL lớn"], ans: 0 },
  { q: "MySQL được đánh giá cao nhờ đặc điểm nào?", opts: ["Tốc độ xử lý nhanh và đảm bảo an toàn dữ liệu","Khả năng xử lý chậm và không an toàn","Khó cài đặt và sử dụng","Không hỗ trợ quản lý dữ liệu trên Internet"], ans: 0 },
  { q: "Phần mềm nào sau đây giúp kết nối và làm việc với hệ QTCSDL MySQL?", opts: ["HeidiSQL","Photoshop","Excel","Word"], ans: 0 },
  { q: "HeidiSQL là phần mềm dùng để làm gì?", opts: ["Thiết kế đồ họa","Kết nối và quản lý CSDL MySQL","Tạo bảng tính","Soạn thảo văn bản"], ans: 1 },
  { q: "Sau khi cài đặt MySQL, việc nhập mật khẩu cho tài khoản Root là:", opts: ["Không cần thiết","Tùy chọn","Bắt buộc để bảo mật","Chỉ cần khi đổi tên người dùng"], ans: 2 },

  // --- Nhóm 2: Cấu trúc bảng & khóa ---
  { q: "Trong bảng <code>banthuam</code>, trường nào được dùng làm khóa chính?", opts: ["tenBannhac","tenNhacsi","idBanthuam","tenCasi"], ans: 2 },
  { q: "Trong bảng <code>banthuam</code>, trường <code>idCasi</code> là khóa ngoại tham chiếu đến bảng nào?", opts: ["bannhac","nhacsi","casi","Banthuam"], ans: 2 },
  { q: "Trường nào trong bảng <code>bannhac</code> cần có kiểu dữ liệu VARCHAR(255)?", opts: ["idNhacsi","tenBannhac","idBannhac","idCasi"], ans: 1 },
  { q: "Trường <code>idBanthuam</code> trong bảng banthuam có kiểu dữ liệu nào?", opts: ["VARCHAR","DATE","INT","TEXT"], ans: 2 },
  { q: "Bảng nào sau đây có trường <code>idNhacsi</code> làm khóa chính?", opts: ["banthuam","casi","bannhac","nhacsi"], ans: 3 },
  { q: "Trong bảng <code>nhacsi</code>, trường <code>idNhacsi</code> thuộc loại khóa gì?", opts: ["Khóa chính","Khóa ngoại","Khóa cấm trùng lặp","Không phải khóa"], ans: 0 },
  { q: "Bảng <code>bannhac</code> có quan hệ tham chiếu đến bảng nhacsi qua trường nào?", opts: ["idCasi","tenBannhac","idNhacsi","idBanthuam"], ans: 2 },
  { q: "Trường <code>idBannhac</code> trong bảng banthuam là loại khóa gì?", opts: ["Khóa chính","Khóa ngoại","Khóa UNIQUE","Không phải khóa"], ans: 1 },
  { q: "Cặp trường nào trong bảng bannhac cần khai báo khóa UNIQUE để chống trùng lặp?", opts: ["tenBannhac và idNhacsi","tenBannhac và idBannhac","idBannhac và idNhacsi","Column1 và idBannhac"], ans: 0 },
  { q: "Để khai báo khóa chính trong bảng bannhac, ta chọn mục nào?", opts: ["Create new table","Create new column","Create new index","Create new field"], ans: 2 },
  { q: "Để khai báo khóa ngoài, ta chọn mục nào sau đây?", opts: ["Primary Key","Foreign Key","Unique Key","Index Key"], ans: 1 },
  { q: "Nếu không khai báo khóa chính cho bảng bannhac, điều gì xảy ra?", opts: ["Bảng sẽ không thể lưu được","Bảng sẽ không có dữ liệu","Các trường trong bảng sẽ bị xóa","Bảng vẫn lưu nhưng không có khóa chính"], ans: 3 },
  { q: "Khóa ngoài trong bảng bannhac giúp đảm bảo điều gì?", opts: ["Dữ liệu trong bảng nhacsi tồn tại","Dữ liệu trong bảng bannhac là duy nhất","Dữ liệu trong bảng bannhac không bị trùng lặp","Liên kết giữa bảng bannhac và nhacsi là hợp lệ"], ans: 3 },
  { q: "Tại sao cần khai báo khóa UNIQUE cho cặp trường tenBannhac và idNhacsi?", opts: ["Tăng tốc độ truy vấn","Để tránh trùng lặp giá trị","Giảm dung lượng bảng","Tăng tính bảo mật"], ans: 1 },

    items: [
      { s: "a) Trường idBanthuam trong bảng banthuam có thể trùng lặp.", ans: false },
      { s: "b) Trường tenCasi trong bảng casi có thể chứa nhiều bản ghi trùng lặp giá trị.", ans: true },
      { s: "c) Trường idCasi trong bảng banthuam là khóa chính.", ans: false },
      { s: "d) Trong bảng banthuam, chỉ có duy nhất một bản thu âm được gắn với một idBanthuam.", ans: true },
    ]
  },
];

// ===================== STATE =====================
let mode = 'mc';
let mcSize = 20;
let queue = [];
let current = 0;
let answered = false;
let score = { c: 0, w: 0, s: 0 };
let tfAnswers = {};

function setMCSize(n) {
  mcSize = n;
  document.querySelectorAll('.size-tab').forEach((t,i) => {
    t.classList.toggle('active', [20,40,70][i] === n);
  });
  if (mode === 'mc') restart();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    t.classList.toggle('active', ['mc','tf','all'][i] === m);
  });
  // Show/hide size selector
  document.getElementById('mcSizeTabs').style.display = (m === 'mc') ? 'flex' : 'none';
  restart();
}

function buildQueue() {
  if (mode === 'mc') {
    const count = Math.min(mcSize, mcQuestions.length);
    queue = shuffle([...mcQuestions]).slice(0, count).map(q => ({ type:'mc', data:q }));
  } else if (mode === 'tf') {
    queue = shuffle([...tfQuestions]).map(q => ({ type:'tf', data:q }));
  } else {
    const mc = shuffle([...mcQuestions]).slice(0,15).map(q=>({type:'mc',data:q}));
    const tf = shuffle([...tfQuestions]).slice(0,3).map(q=>({type:'tf',data:q}));
    queue = shuffle([...mc,...tf]);
  }
}

function shuffle(arr) {
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function restart() {
  current = 0; answered = false;
  score = {c:0,w:0,s:0}; tfAnswers = {};
  buildQueue();
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizArea').style.display = '';
  updateScore(); render();
}

function updateScore() {
  document.getElementById('scoreC').textContent = score.c;
  document.getElementById('scoreW').textContent = score.w;
  const left = queue.length - current;
  document.getElementById('scoreL').textContent = Math.max(0, left);
  const pct = queue.length ? Math.round((current/queue.length)*100) : 0;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progPct').textContent = pct+'%';
  document.getElementById('progLabel').textContent = `Câu ${Math.min(current+1,queue.length)} / ${queue.length}`;
}

function render() {
  if (current >= queue.length) { showResult(); return; }
  answered = false;
  const item = queue[current];
  const wrap = document.getElementById('questionWrap');
  wrap.innerHTML = '';

  if (item.type === 'mc') renderMC(item.data, wrap);
  else renderTF(item.data, wrap);

  document.getElementById('btnCheck').style.display = 'inline-block';
  document.getElementById('btnCheck').disabled = true;
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('btnSkip').style.display = 'inline-block';
  updateScore();
}

function renderMC(q, wrap) {
  const card = document.createElement('div');
  card.className = 'question-card';
  const labels = ['A','B','C','D'];
  card.innerHTML = `
    <div class="question-num">Câu ${current+1} · Trắc nghiệm</div>
    <div class="question-text">${q.q}</div>
    <div class="options-list" id="optList">
      ${q.opts.map((o,i)=>`
        <button class="option-btn" id="opt${i}" onclick="selectOpt(${i})">
          <span class="opt-label">${labels[i]}</span>
          <span>${o}</span>
        </button>`).join('')}
    </div>
    <div class="feedback-box" id="fb"></div>
  `;
  wrap.appendChild(card);
}

let selectedOpt = -1;
function selectOpt(i) {
  if (answered) return;
  selectedOpt = i;
  document.querySelectorAll('.option-btn').forEach((b,j)=>{
    b.style.borderColor = j===i ? 'var(--accent)' : '';
    b.style.background = j===i ? 'rgba(59,130,246,0.08)' : '';
    b.querySelector('.opt-label').style.background = j===i ? 'var(--accent)' : '';
    b.querySelector('.opt-label').style.color = j===i ? '#fff' : '';
  });
  document.getElementById('btnCheck').disabled = false;
}

function checkAnswer() {
  if (answered) return;
  answered = true;
  const item = queue[current];
  if (item.type === 'mc') checkMC(item.data);
  else checkTF(item.data);
  document.getElementById('btnCheck').style.display = 'none';
  document.getElementById('btnNext').style.display = 'inline-block';
  document.getElementById('btnSkip').style.display = 'none';
}

function checkMC(q) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);
  const correct = q.ans;
  const fb = document.getElementById('fb');
  if (selectedOpt === correct) {
    btns[correct].classList.add('correct');
    fb.className = 'feedback-box correct show';
    fb.textContent = '✓ Chính xác! Câu trả lời đúng.';
    score.c++;
  } else {
    if (selectedOpt >= 0) btns[selectedOpt].classList.add('wrong');
    btns[correct].classList.add('show-correct');
    fb.className = 'feedback-box wrong show';
    fb.innerHTML = `✗ Sai. Đáp án đúng là: <strong>${['A','B','C','D'][correct]}</strong>`;
    score.w++;
  }
  updateScore();
}

function renderTF(q, wrap) {
  tfAnswers = {};
  const card = document.createElement('div');
  card.className = 'question-card';
  let html = `
    <div class="question-num">Câu ${current+1} · Đúng / Sai</div>
    <div class="question-text">${q.context}</div>
    <div class="tf-group">`;
  q.items.forEach((item,i)=>{
    html += `
      <div class="tf-item" id="tfi${i}">
        <div class="tf-statement">${item.s}</div>
        <div class="tf-buttons">
          <button class="tf-btn" id="tfT${i}" onclick="selectTF(${i},true)">✓ Đúng</button>
          <button class="tf-btn" id="tfF${i}" onclick="selectTF(${i},false)">✗ Sai</button>
        </div>
      </div>`;
  });
  html += `</div><div class="feedback-box" id="fb"></div>`;
  card.innerHTML = html;
  wrap.appendChild(card);
}

function selectTF(i, val) {
  if (answered) return;
  tfAnswers[i] = val;
  const tBtn = document.getElementById('tfT'+i);
  const fBtn = document.getElementById('tfF'+i);
  tBtn.className = val ? 'tf-btn selected-true' : 'tf-btn';
  fBtn.className = !val ? 'tf-btn selected-false' : 'tf-btn';
  const allAnswered = queue[current].data.items.every((_,j)=>tfAnswers[j]!==undefined);
  document.getElementById('btnCheck').disabled = !allAnswered;
}

function checkTF(q) {
  let correct = 0;
  q.items.forEach((item,i)=>{
    const tBtn = document.getElementById('tfT'+i);
    const fBtn = document.getElementById('tfF'+i);
    tBtn.disabled = true; fBtn.disabled = true;
    const userAns = tfAnswers[i];
    if (userAns === item.ans) {
      correct++;
      (item.ans ? tBtn : fBtn).classList.add('reveal-correct');
    } else {
      (userAns ? tBtn : fBtn).classList.add('reveal-wrong');
      (item.ans ? tBtn : fBtn).classList.add('reveal-correct');
    }
  });
  const fb = document.getElementById('fb');
  if (correct === q.items.length) {
    fb.className='feedback-box correct show';
    fb.textContent=`M tày hơn t r ${correct}/${q.items.length} ý.`;
    score.c++;
  } else if (correct > q.items.length/2) {
    fb.className='feedback-box correct show';
    fb.textContent=`✓ Đúng ${correct}/${q.items.length} ý. Xem lại các ý sai `;
    score.c++;
  } else {
    fb.className='feedback-box wrong show';
    fb.textContent=`✗ Chỉ đúng ${correct}/${q.items.length} ý. Ôn lại phần này `;
    score.w++;
  }
  updateScore();
}

function nextQuestion() {
  current++;
  selectedOpt = -1;
  render();
}

function skipQuestion() {
  score.s++;
  current++;
  selectedOpt = -1;
  render();
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.classList.add('show');
  const total = score.c + score.w + score.s;
  const pct = total ? Math.round((score.c/total)*100) : 0;
  document.getElementById('resPct').textContent = pct+'%';
  document.getElementById('resPts').textContent = `${score.c}/${total}`;
  document.getElementById('rsC').textContent = score.c;
  document.getElementById('rsW').textContent = score.w;
  document.getElementById('rsS').textContent = score.s;
  const titles = pct>=90?'Tày vua':pct>=70?'Tày':pct>=50?'sắp tày':'chưa tày đâu';
  document.getElementById('resTitle').textContent = titles;
  document.getElementById('resSub').textContent = pct>=90?'Tày vcl':pct>=70?'Tày rồi ':pct>=50?'sắp tày ':'Ngu như c';
}

// Init
restart();
</script>
</body>
</html>
